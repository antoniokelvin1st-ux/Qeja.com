<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qeja - Home</title>
<link rel="stylesheet" href="style.css">
<style>
body{padding-bottom:80px;background:#f4f4f4;}
.top-appbar{background:#111;color:white;padding:18px 7%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.feed-wrap{padding:30px 7%;max-width:760px;margin:auto;}
.post-card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:30px;}
.post-card img{width:100%;height:360px;object-fit:cover;display:block;background:#eee;}
.post-body{padding:20px;}
.post-title{font-size:24px;font-weight:bold;}
.post-price{color:#ff7a18;font-weight:bold;margin:8px 0;}
.post-actions button,.small-btn{border:none;padding:9px 14px;border-radius:22px;cursor:pointer;font-weight:bold;margin:4px;}
.orange-btn{background:#ff7a18;color:white;}
.dark-btn{background:#111;color:white;}
.danger-btn{background:#cc0000;color:white;}
.comment-box{display:none;margin-top:15px;}
.comment-item,.reply-item{background:#f3f3f3;padding:10px;border-radius:10px;margin-top:10px;}
.reply-item{margin-left:25px;background:#fafafa;}
.comment-input{width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;margin:8px 0;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;height:70px;display:flex;justify-content:space-around;align-items:center;z-index:200;}
.bottom-nav a{text-decoration:none;color:#555;font-size:13px;font-weight:bold;text-align:center;}
.bottom-nav span{display:block;font-size:23px;}
.post-plus{background:#111;color:white!important;width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-top:-28px;border:4px solid #ff7a18;}
.post-plus span{font-size:34px;}
</style>
</head>
<body>

<header class="top-appbar">
    <div class="logo">QEJA</div>
    <a href="settings.html" style="color:white;text-decoration:none;font-weight:bold;">⚙ Settings</a>
</header>

<main class="feed-wrap">
    <h1>Home</h1>
    <p style="margin-bottom:25px;">Featured, near you, and For You property posts.</p>
    <div id="feedContainer">Loading posts...</div>
</main>

<nav class="bottom-nav">
    <a href="index.html"><span>🏠</span>Home</a>
    <a href="explore.html"><span>🔍</span>Explore</a>
    <a href="post.html" class="post-plus"><span>+</span></a>
    <a href="inbox.html"><span>💬</span>Inbox</a>
    <a href="profile.html"><span>👤</span>Profile</a>
</nav>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
import { ref, onValue, update, push, set, get, remove } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";

let currentUser = null;
let currentUserData = null;

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    const userSnap = await get(ref(database, "users/" + user.uid));
    currentUserData = userSnap.exists() ? userSnap.val() : {
        fullName: "Qeja User",
        email: user.email
    };

    loadPosts();
});

function loadPosts() {
    const feed = document.getElementById("feedContainer");

    onValue(ref(database, "posts"), (snapshot) => {
        feed.innerHTML = "";

        if (!snapshot.exists()) {
            feed.innerHTML = "<div class='post-card'><div class='post-body'><h3>No posts yet</h3><p>Tap + to create your first property post.</p></div></div>";
            return;
        }

        const posts = [];
        snapshot.forEach(child => posts.push(child.val()));
        posts.reverse();

        posts.forEach(post => {
            const image = post.imageURL || "https://images.unsplash.com/photo-1564013799919-ab600027ffc6";

            const card = document.createElement("div");
            card.className = "post-card";

            card.innerHTML = `
                <img src="${image}" onerror="this.src='https://images.unsplash.com/photo-1564013799919-ab600027ffc6'">

                <div class="post-body">
                    <strong>@${post.ownerName || "Qeja User"}</strong>
                    <div class="post-title">${post.title || "Property Listing"}</div>
                    <p>${post.location || "Location not added"}</p>
                    <div class="post-price">${post.price || ""}</div>
                    <p>${post.description || ""}</p>

                    <p>
                        👁 ${post.views || 0} views &nbsp;
                        ❤️ ${post.likesCount || post.likes || 0} likes &nbsp;
                        💬 comments
                    </p>

                    <div class="post-actions">
                        <button class="orange-btn" onclick="togglePostLike('${post.postId}')">❤️ Like</button>
                        <button class="dark-btn" onclick="toggleComments('${post.postId}')">💬 Comment</button>
                        <button class="dark-btn" onclick="sendInquiry('${post.postId}', '${post.ownerId}')">📩 Inquiry</button>
                    </div>

                    <div id="comments-${post.postId}" class="comment-box">
                        <input id="commentInput-${post.postId}" class="comment-input" placeholder="Write a public comment...">
                        <button class="orange-btn small-btn" onclick="addComment('${post.postId}')">Post Comment</button>
                        <div id="commentList-${post.postId}"></div>
                    </div>
                </div>
            `;

            feed.appendChild(card);
        });
    });
}

window.togglePostLike = async function(postId) {
    const likeRef = ref(database, `postLikes/${postId}/${currentUser.uid}`);
    const likeSnap = await get(likeRef);
    const postRef = ref(database, `posts/${postId}`);
    const postSnap = await get(postRef);
    const post = postSnap.val() || {};
    const currentLikes = post.likesCount || post.likes || 0;

    if (likeSnap.exists()) {
        await remove(likeRef);
        await update(postRef, { likesCount: Math.max(0, currentLikes - 1), likes: Math.max(0, currentLikes - 1) });
    } else {
        await set(likeRef, true);
        await update(postRef, { likesCount: currentLikes + 1, likes: currentLikes + 1 });
    }
};

window.toggleComments = function(postId) {
    const box = document.getElementById("comments-" + postId);
    box.style.display = box.style.display === "block" ? "none" : "block";
    loadComments(postId);
};

function loadComments(postId) {
    const list = document.getElementById("commentList-" + postId);

    onValue(ref(database, "comments/" + postId), (snapshot) => {
        list.innerHTML = "";

        if (!snapshot.exists()) {
            list.innerHTML = "<p>No comments yet.</p>";
            return;
        }

        const comments = [];
        snapshot.forEach(child => comments.push(child.val()));

        comments.sort((a, b) => {
            const likesA = a.likesCount || 0;
            const likesB = b.likesCount || 0;
            if (likesB !== likesA) return likesB - likesA;
            return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
        });

        comments.forEach(comment => {
            const isOwner = comment.userId === currentUser.uid;

            const div = document.createElement("div");
            div.className = "comment-item";

            div.innerHTML = `
                <strong>${comment.userName}</strong>
                <p id="commentText-${comment.commentId}">${comment.text}</p>

                <small>❤️ ${comment.likesCount || 0} | 👎 ${comment.dislikesCount || 0}</small><br>

                <button class="small-btn orange-btn" onclick="reactComment('${postId}', '${comment.commentId}', 'like')">Like</button>
                <button class="small-btn dark-btn" onclick="reactComment('${postId}', '${comment.commentId}', 'dislike')">Dislike</button>
                <button class="small-btn dark-btn" onclick="showReplyBox('${postId}', '${comment.commentId}')">Reply</button>

                ${isOwner ? `
                    <button class="small-btn dark-btn" onclick="editComment('${postId}', '${comment.commentId}', '${encodeURIComponent(comment.text)}')">Edit</button>
                    <button class="small-btn danger-btn" onclick="deleteComment('${postId}', '${comment.commentId}')">Delete</button>
                ` : ""}

                <div id="replyBox-${comment.commentId}" style="display:none;margin-top:8px;">
                    <input id="replyInput-${comment.commentId}" class="comment-input" placeholder="Write a reply...">
                    <button class="small-btn orange-btn" onclick="addReply('${postId}', '${comment.commentId}')">Post Reply</button>
                </div>

                <div id="replies-${comment.commentId}"></div>
            `;

            list.appendChild(div);
            loadReplies(postId, comment.commentId);
        });
    });
}

window.addComment = async function(postId) {
    const input = document.getElementById("commentInput-" + postId);
    const text = input.value.trim();

    if (!text) {
        alert("Write a comment first");
        return;
    }

    const commentRef = push(ref(database, "comments/" + postId));

    await set(commentRef, {
        commentId: commentRef.key,
        postId,
        userId: currentUser.uid,
        userName: currentUserData.fullName || "Qeja User",
        text,
        likesCount: 0,
        dislikesCount: 0,
        createdAt: new Date().toISOString()
    });

    input.value = "";
};

window.editComment = async function(postId, commentId, oldText) {
    const decoded = decodeURIComponent(oldText);
    const newText = prompt("Edit your comment:", decoded);

    if (!newText || !newText.trim()) return;

    await update(ref(database, `comments/${postId}/${commentId}`), {
        text: newText.trim(),
        editedAt: new Date().toISOString()
    });
};

window.deleteComment = async function(postId, commentId) {
    if (confirm("Delete this comment?")) {
        await remove(ref(database, `comments/${postId}/${commentId}`));
        await remove(ref(database, `commentReactions/${postId}/${commentId}`));
        await remove(ref(database, `replies/${postId}/${commentId}`));
    }
};

window.reactComment = async function(postId, commentId, type) {
    const reactionRef = ref(database, `commentReactions/${postId}/${commentId}/${currentUser.uid}`);
    const reactionSnap = await get(reactionRef);

    const commentRef = ref(database, `comments/${postId}/${commentId}`);
    const commentSnap = await get(commentRef);
    const comment = commentSnap.val() || {};

    let likes = comment.likesCount || 0;
    let dislikes = comment.dislikesCount || 0;

    if (reactionSnap.exists()) {
        const oldType = reactionSnap.val();

        if (oldType === type) return;

        if (oldType === "like") likes = Math.max(0, likes - 1);
        if (oldType === "dislike") dislikes = Math.max(0, dislikes - 1);
    }

    if (type === "like") likes++;
    if (type === "dislike") dislikes++;

    await set(reactionRef, type);
    await update(commentRef, { likesCount: likes, dislikesCount: dislikes });
};

window.showReplyBox = function(postId, commentId) {
    const box = document.getElementById("replyBox-" + commentId);
    box.style.display = box.style.display === "block" ? "none" : "block";
};

window.addReply = async function(postId, commentId) {
    const input = document.getElementById("replyInput-" + commentId);
    const text = input.value.trim();

    if (!text) {
        alert("Write a reply first");
        return;
    }

    const replyRef = push(ref(database, `replies/${postId}/${commentId}`));

    await set(replyRef, {
        replyId: replyRef.key,
        userId: currentUser.uid,
        userName: currentUserData.fullName || "Qeja User",
        text,
        createdAt: new Date().toISOString()
    });

    input.value = "";
};

function loadReplies(postId, commentId) {
    const replyContainer = document.getElementById("replies-" + commentId);

    onValue(ref(database, `replies/${postId}/${commentId}`), (snapshot) => {
        replyContainer.innerHTML = "";

        if (!snapshot.exists()) return;

        snapshot.forEach(child => {
            const reply = child.val();
            const div = document.createElement("div");
            div.className = "reply-item";
            div.innerHTML = `
                <strong>${reply.userName}</strong>
                <p>${reply.text}</p>
            `;
            replyContainer.appendChild(div);
        });
    });
}

window.sendInquiry = async function(postId, ownerId) {
    if (!ownerId) {
        alert("Owner not found.");
        return;
    }

    const leadRef = push(ref(database, "leads/" + ownerId));

    await set(leadRef, {
        leadId: leadRef.key,
        postId,
        interestedUserId: currentUser.uid,
        interestedUserName: currentUserData.fullName || "Qeja User",
        interestedUserEmail: currentUser.email,
        createdAt: new Date().toISOString(),
        status: "new"
    });

    alert("Inquiry sent successfully.");
};
</script>

</body>
</html>
