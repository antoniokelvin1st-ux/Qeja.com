<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Qeja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">QEJA</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="property.html">Properties</a></li>
        <li><a href="reels.html">Reels</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="profile.html">Profile</a></li>
    </ul>

    <button id="logoutBtn" class="login-btn" style="border:none;cursor:pointer;">Logout</button>
</nav>

<section style="padding:120px 7% 60px;">

    <div class="property-card" style="max-width:800px;margin:auto;">
        <div class="property-info" style="text-align:center;">

            <img src="https://i.pravatar.cc/200"
                 alt="Profile"
                 style="width:150px;height:150px;border-radius:50%;margin-bottom:20px;">

            <h2>Welcome to Qeja</h2>
            <p>Manage your listings, saved properties and account details.</p>

            <hr style="margin:30px 0;">

            <h3>Account Information</h3>

            <p><strong>Name:</strong> <span id="userName">Loading...</span></p>
            <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
            <p><strong>Phone:</strong> <span id="userPhone">Loading...</span></p>
            <p><strong>Role:</strong> <span id="userRole">Loading...</span></p>

        </div>
    </div>

</section>

<footer>
    <p>&copy; 2026 Qeja.com. All rights reserved.</p>
</footer>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";
import { ref, get } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-database.js";

onAuthStateChanged(auth, async (user) => {
    if (user) {
        const userRef = ref(database, "users/" + user.uid);
        const snapshot = await get(userRef);

        if (snapshot.exists()) {
            const data = snapshot.val();

            document.getElementById("userName").textContent = data.fullName || "Not provided";
            document.getElementById("userEmail").textContent = data.email || user.email;
            document.getElementById("userPhone").textContent = data.phone || "Not provided";
            document.getElementById("userRole").textContent = data.role || "user";
        } else {
            document.getElementById("userName").textContent = "Not found";
            document.getElementById("userEmail").textContent = user.email;
            document.getElementById("userPhone").textContent = "Not found";
            document.getElementById("userRole").textContent = "user";
        }
    } else {
        window.location.href = "login.html";
    }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    alert("Logged out successfully");
    window.location.href = "login.html";
});
</script>

</body>
</html>
